name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Nếu cần build bước tĩnh (ví dụ dùng node), thêm bước build ở đây.
      # Ví dụ (nếu bạn có bước build):
      # - name: Setup Node
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: '18'
      # - name: Install and Build
      #   run: |
      #     npm ci
      #     npm run build
      #
      # Giả sử output build hoặc nội dung tĩnh bạn muốn publish là trong src/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: src/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
