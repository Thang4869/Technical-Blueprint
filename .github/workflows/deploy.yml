name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/html/**'   # chỉ deploy khi thay đổi thực sự
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: src/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
