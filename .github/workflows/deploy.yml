name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'src/html/**'   # chỉ deploy khi thay đổi thực sự
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pretty URLs
        run: |
          set -e
          P=gh-pages-dist
          rm -rf "$P"
          mkdir -p "$P"
          rsync -a --delete src/html/ "$P/"
          shopt -s nullglob
          for f in "$P"/*.html; do
            name=$(basename "$f" .html)
            if [ "$name" = "index" ]; then
              continue
            fi
            mkdir -p "$P/$name"
            mv "$f" "$P/$name/index.html"
          done
        shell: bash

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-dist
          publish_branch: gh-pages
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
