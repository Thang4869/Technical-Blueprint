    <script>
        (function(){
            const nav = document.getElementById('bbScrollNav');
            if (!nav) return;
            const ring = nav.querySelector('.bb-ring');
            const pctSpan = nav.querySelector('.percent');
            const R = 18; const C = 2*Math.PI*R;
            ring.style.strokeDasharray = C;

            function docHeight(){ return Math.max(document.documentElement.scrollHeight, document.body.scrollHeight); }
            function collectSections(){
                let els = Array.from(document.querySelectorAll('.section-target'));
                if (!els.length) els = Array.from(document.querySelectorAll('main h2, main h3'));
                const arr = els.map(e => ({ el: e, top: e.getBoundingClientRect().top + window.scrollY })).filter(x=>!isNaN(x.top));
                const uniq = [];
                arr.sort((a,b)=>a.top-b.top).forEach(x=>{ if (!uniq.length || Math.abs(uniq[uniq.length-1].top - x.top) > 6) uniq.push(x); });
                return uniq;
            }

            let sections = collectSections();
            window.addEventListener('resize', () => { sections = collectSections(); updateProgress(); });

            function updateProgress(){
                const scrollY = window.scrollY || window.pageYOffset;
                const total = Math.max(1, docHeight() - window.innerHeight);
                let pct = Math.min(100, Math.max(0, (scrollY / total) * 100));
                const dash = C * (1 - pct/100);
                ring.style.strokeDashoffset = dash;
                pctSpan.textContent = Math.round(pct) + '%';
                if (pct >= 99.5) nav.classList.add('bb-full'); else nav.classList.remove('bb-full');
            }

            function handleClick(){
                const scrollY = window.scrollY || window.pageYOffset;
                const total = Math.max(1, docHeight() - window.innerHeight);
                const pct = Math.min(100, Math.max(0, (scrollY / total) * 100));
                if (pct >= 99.5) { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
                if (!sections || !sections.length) sections = collectSections();
                let idx = -1;
                for (let i=0;i<sections.length;i++){ if (sections[i].top <= scrollY + 8) idx = i; }
                if (idx === -1) { if (sections.length) window.scrollTo({ top: sections[0].top, behavior: 'smooth' }); else window.scrollTo({ top:0, behavior:'smooth' }); return; }
                const currentTop = sections[idx].top;
                if (Math.abs(scrollY - currentTop) > 8) { window.scrollTo({ top: currentTop, behavior: 'smooth' }); }
                else { const prev = Math.max(0, idx-1); if (idx === 0) window.scrollTo({ top:0, behavior:'smooth' }); else window.scrollTo({ top: sections[prev].top, behavior:'smooth' }); }
            }

            nav.addEventListener('click', handleClick);
            nav.addEventListener('keydown', (e)=>{ if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handleClick(); } });
            let ticking = false;
            window.addEventListener('scroll', ()=>{ if (!ticking){ ticking = true; requestAnimationFrame(()=>{ updateProgress(); ticking=false; }); } }, { passive: true });
            updateProgress();
            const mo = new MutationObserver(()=>{ sections = collectSections(); });
            mo.observe(document.body, { childList: true, subtree: true });
        })();
    </script>
    <script>
        (function(){
            function annotate(root=document){
                try {
                    // Ensure a global reveal observer exists for dynamic elements
                    if (!window._bbRevealObserver) {
                        const opts = { root: null, rootMargin: '0px 0px -8% 0px', threshold: 0.12 };
                        window._bbRevealObserver = new IntersectionObserver((entries) => {
                            entries.forEach(entry => {
                                if (entry.isIntersecting) {
                                    entry.target.classList.add('revealed');
                                    entry.target.classList.add('stagger-in');
                                    entry.target.classList.remove('reveal-on-scroll');
                                    window._bbRevealObserver.unobserve(entry.target);
                                }
                            });
                        }, opts);
                    }
                    const selectors = ['section','.bg-white','.tech-card','.chart-container','.fade-in','.max-w-4xl','.bg-indigo-600','.bg-slate-800','.bg-slate-900','.bg-indigo-50'];
                    selectors.forEach(s => (root.querySelectorAll(s)||[]).forEach(el => {
                        if (!el.classList.contains('reveal-on-scroll')) el.classList.add('reveal-on-scroll');
                        if (!el.classList.contains('stagger-item')) el.classList.add('stagger-item');
                        try { window._bbRevealObserver.observe(el); } catch(e){}
                    }));

                    // Parallax targets (decorative patterns / blobs)
                    (root.querySelectorAll('.header-pattern, .absolute')||[]).forEach((el,i) => {
                        if (!el.dataset.parallaxSpeed) el.dataset.parallaxSpeed = (i % 2 === 0) ? '0.06' : '0.12';
                        el.classList.add('parallax');
                    });

                    // Convert images to lazy-friendly pattern if present
                    (root.querySelectorAll('img')||[]).forEach(img => {
                        if (img.dataset.src || img.loading === 'lazy') return;
                        const src = img.getAttribute('src');
                        if (src) {
                            img.dataset.src = src;
                            img.removeAttribute('src');
                            img.loading = 'lazy';
                            img.classList.add('lazy-img');
                        }
                    });

                    // Reveal elements already in viewport immediately
                    (root.querySelectorAll('.reveal-on-scroll')||[]).forEach(el => {
                        try {
                            const r = el.getBoundingClientRect();
                            if (r.top < window.innerHeight && r.bottom > 0) {
                                el.classList.add('revealed','stagger-in');
                                el.classList.remove('reveal-on-scroll');
                                try { window._bbRevealObserver.unobserve(el); } catch(e){}
                            }
                        } catch(e){/* ignore */}
                    });
                } catch (e) { console.error('Annotate error', e); }
            }

            document.addEventListener('DOMContentLoaded', () => {
                annotate();
                const main = document.getElementById('main-content');
                if (main) {
                    const mo = new MutationObserver(muts => {
                        muts.forEach(m => m.addedNodes.forEach(n => { if (n.nodeType === 1) annotate(n); }));
                    });
                    mo.observe(main, { childList: true, subtree: true });
                }
            });
        })();
    </script>
</body>
    <div id="bb-error-overlay"></div>
    <script>
        (function(){
            function showError(msg, url, line, col, err) {
                const container = document.getElementById('bb-error-overlay');
                if (!container) return;
                container.style.display = 'block';
                container.innerHTML = `<h3 class="bb-error-title">JavaScript Error Detected</h3><pre class="bb-error-pre">${msg}\n${url || ''}:${line || ''}:${col || ''}\n${err && err.stack ? err.stack : ''}</pre>`;
            }
            window.addEventListener('error', function(e){ showError(e.message, e.filename, e.lineno, e.colno, e.error); });
            window.addEventListener('unhandledrejection', function(e){ showError(String(e.reason)); });
            const oldErr = console.error; console.error = function(){ oldErr.apply(this, arguments); try { showError(Array.from(arguments).join(' ')); } catch(e){} };
        })();
    </script>
</html>
